baseURL = 'https://zhuanz.github.io/'
locale = 'zh-CN'
title = "ZhuanZ' Blog"
theme = 'PaperMod'
defaultContentLanguage = 'zh'
enableInlineShortcodes = true

[params]
  description = "ZhuanZ 的个人博客"
  author = "ZhuanZ"
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  ShowShareButtons = false
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  homeInfoParams = { Title = "Hi 👋", Content = "欢迎来到我的博客" }

  socialIcons = [
    { name = "github", url = "https://github.com/zhuanz" }
  ]

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]
